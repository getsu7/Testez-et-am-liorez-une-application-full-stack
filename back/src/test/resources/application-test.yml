spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;NON_KEYWORDS=USER
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  docker:
    compose:
      enabled: false

oc:
  app:
    jwtSecret: testSecretKeyForJWTTokenGenerationAndValidationInSpringBootIntegrationTestSuiteHS512RequiresSixtyFourBytes
    jwtExpirationMs: 86400000

